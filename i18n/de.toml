[podcasting_label]
other = "Podcasting"

[podcasting_h2]
other = "Gespräche, die Kontext herstellen"

[podcasting_intro]
other = "Ich konzipiere, moderiere und produziere Podcasts, seit 2016 und mit einem klaren Fokus auf Wissenschaft, Bildung und Zivilgesellschaft. Gute Podcasts beginnen für mich mit der Suche nach den passenden Gesprächspartner*innen, mit Gesprächen, die Kontext herstellen, mit den richtigen Nachfragen zur richtigen Zeit und mit Respekt für die Menschen, die mir gegenübersitzen."

[podcast_svc1_title]
other = "Konzeption & Formatentwicklung"

[podcast_svc1_desc]
other = "Von der ersten Idee zum fertigen Konzept: Zielgruppe, Format, Erzählhaltung, Struktur. Ich arbeite mit Organisationen, die ein eigenes Podcast-Format entwickeln wollen, und begleite auf Wunsch auch über die erste Staffel hinaus."

[podcast_svc2_title]
other = "Moderation & Hosting"

[podcast_svc2_desc]
other = "Ich moderiere eigene und fremde Formate als Host. Ich habe Erfahrung und ein gutes Gespür für Gespräche, aus vielen Stunden vor dem Mikrofon, in Interviews, Panels und Gesprächsrunden."

[podcast_svc3_title]
other = "Produktion"

[podcast_svc3_desc]
other = "Ich produziere Podcasts von der Aufnahme bis zur fertigen Episode, mit hohem Anspruch an mich und an die Qualität im Ergebnis."

[podcast_svc4_title]
other = "Workshops"

[podcast_svc4_desc]
other = "Podcast-Workshops für Einsteiger*innen: Technik, Konzeptentwicklung, schnelle Umsetzung. Am Ende des Workshops steht ein Konzept, mit dem sich arbeiten lässt."

[current_formats]
other = "Aktuelle Formate"

[sicherheitsluecke_desc]
other = "Ein Podcast über Cybersecurity: verständlich, fundiert und mit Haltung. Mit Volker Skwarek (HAW Hamburg), Monina Schwarz (LSI Bayern) und Ingo Timm (DFKI & Uni Trier). Konzeption und Produktion: Christian Friedrich. Ein Podcast der Hamburg Open Online University."

[hwwdw_desc]
other = "Bekannte Menschen aus Hamburg verraten, was sie wirklich lernen und wissen wollen. Im Gespräch verbinden wir ihre Lebensläufe und Lernwünsche mit den kostenlosen Lernangeboten der HOOU und ihren Themen. Moderation: Nicola Wessinghage & Christian Friedrich. Produktion: Christian Friedrich. Ein Podcast der Hamburg Open Online University."

