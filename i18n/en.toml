[podcasting_label]
other = "Podcasting"

[podcasting_h2]
other = "Conversations that create context"

[podcasting_intro]
other = "I develop, host and produce podcasts, since 2016 and with a clear focus on academia, education and civil society. For me, good podcasts start with finding the right conversation partners, with conversations that create context, with the right questions at the right time and with respect for the people sitting across from me."

[podcast_svc1_title]
other = "Concept & Format Development"

[podcast_svc1_desc]
other = "From the initial idea to a finished concept: audience, format, narrative approach, structure. I work with organizations that want to develop their own podcast format and provide ongoing support beyond the first season if needed."

[podcast_svc2_title]
other = "Hosting & Moderation"

[podcast_svc2_desc]
other = "I host my own formats and others'. I have experience and a strong sense for conversation, from many hours behind the microphone, in interviews, panels and roundtable discussions."

[podcast_svc3_title]
other = "Production"

[podcast_svc3_desc]
other = "I produce podcasts from recording to finished episode, with high standards for myself and for the quality of the result."

[podcast_svc4_title]
other = "Workshops"

[podcast_svc4_desc]
other = "Podcast workshops for beginners: technology, concept development, quick implementation. By the end of the workshop, participants have a concept they can work with."

[current_formats]
other = "Current formats"

[sicherheitsluecke_desc]
other = "A podcast about cybersecurity: accessible, well-researched and with a clear point of view. With Volker Skwarek (HAW Hamburg), Monina Schwarz (LSI Bayern) and Ingo Timm (DFKI & University of Trier). Concept and production: Christian Friedrich. A podcast by the Hamburg Open Online University."

[hwwdw_desc]
other = "Well-known people from Hamburg share what they really want to learn and know. In each conversation, we connect their personal stories and learning interests with the free learning resources offered by HOOU. Hosted by Nicola Wessinghage & Christian Friedrich. Production: Christian Friedrich. A podcast by the Hamburg Open Online University."

