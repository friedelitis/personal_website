[hero_intro]
other = "Hi, I'm Christian. As a consultant, I work at the intersections of technology, organizations and learning. As a facilitator, I help teams and groups collaborate and guide large audiences through events. As a podcaster, I help people find the right podcast concept. Especially in the context of academia, education, civil society and non-profits."

[hero_location]
other = "I live and work in Berlin."

[hero_cta]
other = "Get in touch"

[about_label]
other = "About"

[about_p1]
other = "I work with organizations in academia, education and civil society: universities, associations, foundations, non-profits. Usually when technology meets organizational structures, communication and ways of working, and the question is how it all fits together."

[about_p2]
other = "I support strategy processes and program work, advise on communication and capacity building and facilitate team processes. My background is in systemic organizational consulting: I look at the whole picture, not just what's making the most noise."

[about_p3]
other = "I've been working as an independent consultant since 2011, initially alongside employed positions, full-time for the past few years. In between and in parallel, I worked as Digital Officer at the WZB Berlin Social Science Center, as Policy Advisor for Education and Research at Wikimedia Deutschland and in building the Leuphana Digital School at Leuphana University Lüneburg. Each of these roles has shaped how I look at organizations today: close to the practice, analytical and with respect for what already works."

[about_p4]
other = "Since 2016, I also produce and host podcasts, often for educational institutions and organizations looking to develop their own format. What started as a side project has since become a distinct part of my work."

[credentials_label]
other = "Education & Certifications"

[credentials_list]
other = "Systemic Organizational Consultant – artop, Berlin (2023)<br>Certified Scrum Master (CSM) – Scrum Alliance<br>ITIL Foundation Level<br>B.Sc. Business Psychology & Political Science – Leuphana University Lüneburg"

[consulting_label]
other = "Consulting"

[consulting_h2]
other = "Guiding change,<br>strengthening organizations"

[consulting_intro1]
other = "I advise organizations in academia, education and civil society: universities, associations, foundations, research institutions. Most of the time it's about change. A strategy that needs to be developed. Structures, decision-making processes, knowledge management or internal communication that no longer work."

[consulting_intro2]
other = "My approach is systemic. That means I don't just look at the problem on the table but at the organisation around it. At patterns, dependencies and what has remained unspoken. The solution is not predetermined. And it belongs to the organisation in the end, not to me."

[how_i_work]
other = "How I work"

[how_i_work_p1]
other = "Every engagement starts with thorough analysis: conversations with the people involved, document analysis, focus groups, depending on what the situation requires. Building on that, I work in workshops, through interventions and in direct advisory work with leadership and teams."

[how_i_work_p2]
other = "Many of my consulting engagements run over months. I reassess regularly, keep the goal in focus together with teams and leadership and make visible where decisions are still pending or where implementation has stalled."

[how_i_work_p3]
other = "When needed, I work with a network of specialists in communications consulting, brand strategy and corporate identity, design, process consulting and software development."

