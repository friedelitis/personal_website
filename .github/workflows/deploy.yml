name: Deploy to Reclaim Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.140.2'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy via LFTP
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@gauntlet.reclaimhosting.com;
            mirror --reverse --delete --verbose public/ /public_html/;
            quit
          "
